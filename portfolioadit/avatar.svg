<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d8d8"/>
      <stop offset="100%" stop-color="#8fbfbf"/>
    </linearGradient>
    <linearGradient id="beanieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6baed6"/>
      <stop offset="100%" stop-color="#4a90c4"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdd5b8"/>
      <stop offset="100%" stop-color="#f8c4a0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="240" r="195" fill="#13131f"/>
  <circle cx="200" cy="240" r="195" fill="url(#bgGlow)"/>
  <circle cx="200" cy="240" r="195" stroke="#a855f7" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <circle cx="200" cy="240" r="185" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.1" fill="none" stroke-dasharray="6 8"/>

  <!-- ===== FLOATING BODY GROUP ===== -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-10; 0,0" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>

    <!-- ===== JACKET ===== -->
    <path d="M58 482 Q54 375 82 338 Q112 298 162 284 L200 308 L238 284 Q288 298 318 338 Q346 375 342 482 Z"
      fill="url(#jacketGrad)" stroke="#7aabab" stroke-width="1.8"/>
    <!-- Quilted vertical lines -->
    <line x1="140" y1="292" x2="122" y2="430" stroke="#7aabab" stroke-width="1.2" opacity="0.55"/>
    <line x1="174" y1="287" x2="166" y2="435" stroke="#7aabab" stroke-width="1.2" opacity="0.55"/>
    <line x1="226" y1="287" x2="234" y2="435" stroke="#7aabab" stroke-width="1.2" opacity="0.55"/>
    <line x1="260" y1="292" x2="278" y2="430" stroke="#7aabab" stroke-width="1.2" opacity="0.55"/>
    <!-- Quilted horizontal lines -->
    <path d="M72 350 Q200 340 328 350" stroke="#7aabab" stroke-width="1.2" fill="none" opacity="0.55"/>
    <path d="M66 392 Q200 382 334 392" stroke="#7aabab" stroke-width="1.2" fill="none" opacity="0.55"/>
    <path d="M62 434 Q200 424 338 434" stroke="#7aabab" stroke-width="1.2" fill="none" opacity="0.55"/>
    <!-- Inner shirt / turtleneck -->
    <path d="M166 284 Q200 302 234 284 Q222 328 200 332 Q178 328 166 284 Z"
      fill="#e8e8e8" stroke="#cccccc" stroke-width="1"/>
    <!-- Collar flaps -->
    <path d="M166 284 Q146 293 143 312 Q154 307 170 296 Z" fill="#a8c8c8" stroke="#7aabab" stroke-width="1"/>
    <path d="M234 284 Q254 293 257 312 Q246 307 230 296 Z" fill="#a8c8c8" stroke="#7aabab" stroke-width="1"/>

    <!-- ===== NECK ===== -->
    <rect x="182" y="265" width="36" height="30" rx="11" fill="url(#skinGrad)" stroke="#e0a888" stroke-width="0.8"/>

    <!-- ===== HEAD ===== -->
    <ellipse cx="200" cy="214" rx="76" ry="80" fill="url(#skinGrad)" stroke="#e0a888" stroke-width="1.5"/>

    <!-- Ears -->
    <ellipse cx="125" cy="220" rx="13" ry="17" fill="url(#skinGrad)" stroke="#e0a888" stroke-width="1.2"/>
    <ellipse cx="125" cy="220" rx="7" ry="11" fill="#f8c4a0" opacity="0.55"/>
    <ellipse cx="275" cy="220" rx="13" ry="17" fill="url(#skinGrad)" stroke="#e0a888" stroke-width="1.2"/>
    <ellipse cx="275" cy="220" rx="7" ry="11" fill="#f8c4a0" opacity="0.55"/>

    <!-- ===== BEANIE ===== -->
    <path d="M128 200 Q130 142 200 130 Q270 142 272 200 Z"
      fill="url(#beanieGrad)" stroke="#3d7ab5" stroke-width="1.8"/>
    <!-- Beanie brim band -->
    <path d="M124 208 Q126 194 200 188 Q274 194 276 208 Q274 222 200 226 Q126 222 124 208 Z"
      fill="#5a9fd4" stroke="#3d7ab5" stroke-width="1.5"/>
    <!-- Ribbing lines -->
    <line x1="150" y1="134" x2="146" y2="200" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="163" y1="131" x2="160" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="176" y1="130" x2="174" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="189" y1="129" x2="188" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="200" y1="129" x2="200" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="211" y1="129" x2="212" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="224" y1="130" x2="226" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="237" y1="131" x2="240" y2="199" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <line x1="250" y1="134" x2="254" y2="200" stroke="#3a78b2" stroke-width="1.8" opacity="0.5"/>
    <!-- Hair peeking -->
    <path d="M128 200 Q132 213 136 219" fill="none" stroke="#6b3d1e" stroke-width="4" stroke-linecap="round"/>
    <path d="M272 200 Q268 213 264 219" fill="none" stroke="#6b3d1e" stroke-width="4" stroke-linecap="round"/>

    <!-- ===== EYEBROWS ===== -->
    <path d="M160 229 Q173 224 187 227" stroke="#6b3d1e" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M213 227 Q227 224 240 229" stroke="#6b3d1e" stroke-width="3.8" stroke-linecap="round" fill="none"/>

    <!-- ===== GLASSES ===== -->
    <!-- Lens circles -->
    <circle cx="176" cy="244" r="24" fill="white" fill-opacity="0.06" stroke="#4a3020" stroke-width="2.8"/>
    <circle cx="224" cy="244" r="24" fill="white" fill-opacity="0.06" stroke="#4a3020" stroke-width="2.8"/>
    <!-- Bridge -->
    <line x1="200" y1="244" x2="200" y2="244" stroke="#4a3020" stroke-width="2.8"/>
    <path d="M152 244 l48 0 M200 244 l48 0" stroke="#4a3020" stroke-width="2.8" fill="none"/>
    <!-- Arms -->
    <line x1="152" y1="244" x2="132" y2="238" stroke="#4a3020" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="248" y1="244" x2="268" y2="238" stroke="#4a3020" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Lens shine -->
    <path d="M160 234 Q163 229 167 231" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>
    <path d="M208 234 Q211 229 215 231" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- ===== EYES ===== -->
    <circle cx="176" cy="246" r="8" fill="#4a2e0e"/>
    <circle cx="176" cy="246" r="5" fill="#2a1a06"/>
    <circle cx="173" cy="243" r="2" fill="white" opacity="0.9"/>
    <circle cx="224" cy="246" r="8" fill="#4a2e0e"/>
    <circle cx="224" cy="246" r="5" fill="#2a1a06"/>
    <circle cx="221" cy="243" r="2" fill="white" opacity="0.9"/>

    <!-- ===== NOSE ===== -->
    <path d="M196 263 Q200 271 204 263" stroke="#d4956a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
    <ellipse cx="194" cy="268" rx="5" ry="3" fill="#e8a080" opacity="0.18"/>
    <ellipse cx="206" cy="268" rx="5" ry="3" fill="#e8a080" opacity="0.18"/>

    <!-- ===== SMILE ===== -->
    <path d="M183 281 Q200 295 217 281" stroke="#c07050" stroke-width="2.8" stroke-linecap="round" fill="none"/>

    <!-- ===== BLUSH ===== -->
    <ellipse cx="152" cy="264" rx="15" ry="9" fill="#f4a0a0" opacity="0.22"/>
    <ellipse cx="248" cy="264" rx="15" ry="9" fill="#f4a0a0" opacity="0.22"/>
  </g>

  <!-- ===== FLOATING PARTICLES ===== -->
  <circle cx="48" cy="155" r="3" fill="#a855f7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;5,-12;0,0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="352" cy="175" r="2.5" fill="#c084fc" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-5,-9;0,0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="358" cy="345" r="3" fill="#a855f7" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.8;0.35" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="42" cy="355" r="2" fill="#c084fc" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>

  <!-- ===== FLOATING BADGES ===== -->
  <g opacity="0.9">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-7; 0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" begin="0.3s"/>
    <rect x="300" y="118" width="82" height="28" rx="9" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="314" y="136" font-family="monospace" font-size="11" fill="#c084fc" font-weight="bold">Node.js</text>
  </g>
  <g opacity="0.9">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-9; 0,0" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" begin="1s"/>
    <rect x="16" y="268" width="78" height="28" rx="9" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="28" y="286" font-family="monospace" font-size="11" fill="#86efac" font-weight="bold">Express</text>
  </g>
  <g opacity="0.85">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-6; 0,0" dur="3.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" begin="1.8s"/>
    <rect x="304" y="345" width="76" height="28" rx="9" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="316" y="363" font-family="monospace" font-size="11" fill="#67e8f9" font-weight="bold">SQLite</text>
  </g>
</svg>
